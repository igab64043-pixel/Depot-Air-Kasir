kind = "mobile"
previewPath = "/"
title = "Kasir Depot Air Isi Ulang"
version = "1.0.0"
id = "artifacts/kasir-depot-air"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 20041

[services.development]
run = "pnpm --filter @workspace/kasir-depot-air run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kasir-depot-air", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/kasir-depot-air", "run", "serve" ]

[services.env]
PORT = "20041"
BASE_PATH = "/"
